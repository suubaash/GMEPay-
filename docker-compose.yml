# GMEPay+ — local development stack (Phase 2 -> Phase 3 handoff artifact).
#
# Verify locally with:   docker compose up --build
# Requires Docker (not used to author/test in the build environment).
#
# Discipline: DB per service per docs/INTER_SERVICE_CONTRACTS.md — each stateful
# service has its own PostgreSQL instance on a dedicated host port (5433..5439).
# Service-to-service traffic uses the Docker DNS name on the gmepay network.

networks:
  gmepay:
    driver: bridge

volumes:
  pg-config:
  pg-txn:
  pg-prefunding:
  pg-ledger:
  pg-settlement:
  pg-notify:
  pg-authid:
  mongo-data:

services:
  # ─────────── INFRASTRUCTURE ───────────

  postgres-config:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: configreg, POSTGRES_USER: gmepay, POSTGRES_PASSWORD: gmepay }
    ports: ["5433:5432"]
    volumes: ["pg-config:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U gmepay -d configreg"], interval: 5s, timeout: 3s, retries: 12 }
    networks: [gmepay]

  postgres-txn:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: txndb, POSTGRES_USER: gmepay, POSTGRES_PASSWORD: gmepay }
    ports: ["5434:5432"]
    volumes: ["pg-txn:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U gmepay -d txndb"], interval: 5s, timeout: 3s, retries: 12 }
    networks: [gmepay]

  postgres-prefunding:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: prefunding, POSTGRES_USER: gmepay, POSTGRES_PASSWORD: gmepay }
    ports: ["5435:5432"]
    volumes: ["pg-prefunding:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U gmepay -d prefunding"], interval: 5s, timeout: 3s, retries: 12 }
    networks: [gmepay]

  postgres-ledger:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: ledger, POSTGRES_USER: gmepay, POSTGRES_PASSWORD: gmepay }
    ports: ["5436:5432"]
    volumes: ["pg-ledger:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U gmepay -d ledger"], interval: 5s, timeout: 3s, retries: 12 }
    networks: [gmepay]

  postgres-settlement:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: settlement, POSTGRES_USER: gmepay, POSTGRES_PASSWORD: gmepay }
    ports: ["5437:5432"]
    volumes: ["pg-settlement:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U gmepay -d settlement"], interval: 5s, timeout: 3s, retries: 12 }
    networks: [gmepay]

  postgres-notify:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: notify, POSTGRES_USER: gmepay, POSTGRES_PASSWORD: gmepay }
    ports: ["5438:5432"]
    volumes: ["pg-notify:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U gmepay -d notify"], interval: 5s, timeout: 3s, retries: 12 }
    networks: [gmepay]

  postgres-authid:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: authid, POSTGRES_USER: gmepay, POSTGRES_PASSWORD: gmepay }
    ports: ["5439:5432"]
    volumes: ["pg-authid:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U gmepay -d authid"], interval: 5s, timeout: 3s, retries: 12 }
    networks: [gmepay]

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
    healthcheck: { test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"], interval: 10s, timeout: 5s, retries: 12 }
    networks: [gmepay]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 12 }
    networks: [gmepay]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment: { ZOOKEEPER_CLIENT_PORT: 2181, ZOOKEEPER_TICK_TIME: 2000 }
    networks: [gmepay]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck: { test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"], interval: 10s, timeout: 5s, retries: 18 }
    networks: [gmepay]

  # ─────────── APPLICATION SERVICES ───────────
  # x-app-defaults: env shared by every Spring Boot service.

  config-registry:
    build: { context: ., dockerfile: services/config-registry/Dockerfile }
    image: gmepay/config-registry:dev
    ports: ["8081:8080"]
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-config:5432/configreg
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: gmepay
      SPRING_DATASOURCE_PASSWORD: gmepay
    depends_on: { postgres-config: { condition: service_healthy } }
    networks: [gmepay]

  rate-fx:
    build: { context: ., dockerfile: services/rate-fx/Dockerfile }
    image: gmepay/rate-fx:dev
    ports: ["8082:8080"]
    environment:
      SERVER_PORT: 8080
      GMEPAY_CONFIG_REGISTRY_BASE_URL: http://config-registry:8080
    depends_on: [config-registry]
    networks: [gmepay]

  prefunding:
    build: { context: ., dockerfile: services/prefunding/Dockerfile }
    image: gmepay/prefunding:dev
    ports: ["8083:8080"]
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-prefunding:5432/prefunding
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: gmepay
      SPRING_DATASOURCE_PASSWORD: gmepay
    depends_on: { postgres-prefunding: { condition: service_healthy } }
    networks: [gmepay]

  smart-router:
    build: { context: ., dockerfile: services/smart-router/Dockerfile }
    image: gmepay/smart-router:dev
    ports: ["8084:8080"]
    environment:
      SERVER_PORT: 8080
      GMEPAY_CONFIG_REGISTRY_BASE_URL: http://config-registry:8080
    depends_on: [config-registry]
    networks: [gmepay]

  qr-service:
    build: { context: ., dockerfile: services/qr-service/Dockerfile }
    image: gmepay/qr-service:dev
    ports: ["8085:8080"]
    environment:
      SERVER_PORT: 8080
      GMEPAY_MERCHANT_QR_DATA_BASE_URL: http://merchant-qr-data:8080
    depends_on: [merchant-qr-data]
    networks: [gmepay]

  auth-identity:
    build: { context: ., dockerfile: services/auth-identity/Dockerfile }
    image: gmepay/auth-identity:dev
    ports: ["8086:8080"]
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-authid:5432/authid
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: gmepay
      SPRING_DATASOURCE_PASSWORD: gmepay
      GMEPAY_CONFIG_REGISTRY_BASE_URL: http://config-registry:8080
    depends_on:
      postgres-authid: { condition: service_healthy }
      config-registry: { condition: service_started }
    networks: [gmepay]

  transaction-mgmt:
    build: { context: ., dockerfile: services/transaction-mgmt/Dockerfile }
    image: gmepay/transaction-mgmt:dev
    ports: ["8087:8080"]
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-txn:5432/txndb
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: gmepay
      SPRING_DATASOURCE_PASSWORD: gmepay
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres-txn: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [gmepay]

  payment-executor:
    build: { context: ., dockerfile: services/payment-executor/Dockerfile }
    image: gmepay/payment-executor:dev
    ports: ["8088:8080"]
    environment:
      SERVER_PORT: 8080
      GMEPAY_CONFIG_REGISTRY_BASE_URL: http://config-registry:8080
      GMEPAY_RATE_FX_BASE_URL: http://rate-fx:8080
      GMEPAY_PREFUNDING_BASE_URL: http://prefunding:8080
      GMEPAY_MERCHANT_QR_DATA_BASE_URL: http://merchant-qr-data:8080
      GMEPAY_SCHEME_ADAPTER_ZEROPAY_BASE_URL: http://scheme-adapter-zeropay:8080
      GMEPAY_TRANSACTION_MGMT_BASE_URL: http://transaction-mgmt:8080
      GMEPAY_REVENUE_LEDGER_BASE_URL: http://revenue-ledger:8080
    depends_on: [config-registry, rate-fx, prefunding, qr-service, scheme-adapter-zeropay, transaction-mgmt, revenue-ledger]
    networks: [gmepay]

  merchant-qr-data:
    build: { context: ., dockerfile: services/merchant-qr-data/Dockerfile }
    image: gmepay/merchant-qr-data:dev
    ports: ["8089:8080"]
    # NOTE: this service ships with autoconfigure.exclude for MongoAutoConfiguration so unit
    # tests don't need a running Mongo. For production: remove that exclude in
    # services/merchant-qr-data/src/main/resources/application.properties and the SPRING_DATA_MONGODB_URI
    # below is honoured.
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/merchant
    depends_on:
      mongo: { condition: service_healthy }
    networks: [gmepay]

  scheme-adapter-zeropay:
    build: { context: ., dockerfile: services/scheme-adapter-zeropay/Dockerfile }
    image: gmepay/scheme-adapter-zeropay:dev
    ports: ["8090:8080"]
    environment:
      SERVER_PORT: 8080
      GMEPAY_MERCHANT_QR_DATA_BASE_URL: http://merchant-qr-data:8080
    depends_on: [merchant-qr-data]
    networks: [gmepay]

  notification-webhook:
    build: { context: ., dockerfile: services/notification-webhook/Dockerfile }
    image: gmepay/notification-webhook:dev
    ports: ["8091:8080"]
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notify:5432/notify
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: gmepay
      SPRING_DATASOURCE_PASSWORD: gmepay
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres-notify: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [gmepay]

  settlement-reconciliation:
    build: { context: ., dockerfile: services/settlement-reconciliation/Dockerfile }
    image: gmepay/settlement-reconciliation:dev
    ports: ["8092:8080"]
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-settlement:5432/settlement
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: gmepay
      SPRING_DATASOURCE_PASSWORD: gmepay
    depends_on: { postgres-settlement: { condition: service_healthy } }
    networks: [gmepay]

  revenue-ledger:
    build: { context: ., dockerfile: services/revenue-ledger/Dockerfile }
    image: gmepay/revenue-ledger:dev
    ports: ["8093:8080"]
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-ledger:5432/ledger
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: gmepay
      SPRING_DATASOURCE_PASSWORD: gmepay
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres-ledger: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [gmepay]

  reporting-compliance:
    build: { context: ., dockerfile: services/reporting-compliance/Dockerfile }
    image: gmepay/reporting-compliance:dev
    ports: ["8094:8080"]
    environment:
      SERVER_PORT: 8080
      GMEPAY_REVENUE_LEDGER_BASE_URL: http://revenue-ledger:8080
      GMEPAY_TRANSACTION_MGMT_BASE_URL: http://transaction-mgmt:8080
    depends_on: [revenue-ledger, transaction-mgmt]
    networks: [gmepay]

  api-gateway:
    build: { context: ., dockerfile: services/api-gateway/Dockerfile }
    image: gmepay/api-gateway:dev
    ports: ["8080:8080"]
    environment:
      SERVER_PORT: 8080
      GMEPAY_PAYMENT_EXECUTOR_BASE_URL: http://payment-executor:8080
      GMEPAY_AUTH_IDENTITY_BASE_URL: http://auth-identity:8080
      GMEPAY_CONFIG_REGISTRY_BASE_URL: http://config-registry:8080
      GMEPAY_RATE_FX_BASE_URL: http://rate-fx:8080
      GMEPAY_PREFUNDING_BASE_URL: http://prefunding:8080
      GMEPAY_TRANSACTION_MGMT_BASE_URL: http://transaction-mgmt:8080
    depends_on: [payment-executor, auth-identity]
    networks: [gmepay]
