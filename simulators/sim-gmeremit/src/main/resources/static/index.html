<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>GMERemit Wallet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
    }

    .phone {
      background: #fff;
      width: 100%;
      max-width: 390px;
      min-height: 100vh;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #1a237e, #283593);
      color: #fff;
      padding: 20px 16px 16px;
    }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
    .header .subtitle { font-size: 12px; opacity: .75; margin-top: 2px; }

    /* ---- User picker ---- */
    .user-section {
      padding: 16px;
      border-bottom: 1px solid #eee;
    }
    .user-section label { font-size: 12px; color: #666; display: block; margin-bottom: 6px; }
    .user-section select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      background: #fafafa;
      outline: none;
      cursor: pointer;
    }
    .balance-badge {
      display: inline-block;
      margin-top: 8px;
      background: #e8eaf6;
      color: #1a237e;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
    }

    /* ---- QR section ---- */
    .qr-section {
      padding: 16px;
      border-bottom: 1px solid #eee;
    }
    .qr-section label { font-size: 12px; color: #666; display: block; margin-bottom: 6px; }
    .qr-section .hint {
      font-size: 11px;
      color: #999;
      margin-bottom: 6px;
    }
    textarea#qrInput {
      width: 100%;
      height: 80px;
      padding: 10px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 11px;
      font-family: monospace;
      resize: none;
      outline: none;
    }
    textarea#qrInput:focus { border-color: #3949ab; }

    /* ---- Buttons ---- */
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity .15s;
    }
    .btn:active { opacity: .8; }
    .btn-scan  { background: #3949ab; color: #fff; }
    .btn-pay   { background: #1b5e20; color: #fff; }
    .btn-clear { background: #eee; color: #333; font-size: 13px; margin-top: 6px; }

    /* ---- Preview card ---- */
    .preview-card {
      margin: 12px 16px 0;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 12px 14px;
      display: none;
    }
    .preview-card.visible { display: block; }
    .preview-card .merchant { font-size: 16px; font-weight: 700; color: #1a237e; }
    .preview-card .mode-badge {
      display: inline-block;
      font-size: 11px;
      background: #e3f2fd;
      color: #0277bd;
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .preview-card .amount-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .preview-card .amount-label { font-size: 12px; color: #666; }
    .preview-card .amount-static { font-size: 18px; font-weight: 700; color: #333; }
    .preview-card input[type=number] {
      flex: 1;
      padding: 7px 10px;
      border: 1.5px solid #ddd;
      border-radius: 7px;
      font-size: 15px;
      outline: none;
    }
    .preview-card input[type=number]:focus { border-color: #3949ab; }

    /* ---- Confirmation screen ---- */
    #confirmScreen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    #confirmScreen.visible { display: flex; }

    .confirm-card {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 370px;
      padding: 28px 24px 20px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
    }

    .confirm-card.success .big-icon { font-size: 56px; color: #2e7d32; }
    .confirm-card.declined .big-icon { font-size: 56px; color: #c62828; }

    .confirm-card .confirm-title {
      font-size: 22px;
      font-weight: 700;
      margin: 12px 0 4px;
    }
    .confirm-card.success .confirm-title { color: #2e7d32; }
    .confirm-card.declined .confirm-title { color: #c62828; }

    .confirm-card .confirm-subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 20px;
    }

    .confirm-card.declined .decline-reason {
      background: #ffebee;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      color: #c62828;
      margin-bottom: 16px;
      word-break: break-word;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #f0f0f0;
      text-align: left;
    }
    .receipt-row:last-of-type { border-bottom: none; }
    .receipt-row .rl { font-size: 13px; color: #666; }
    .receipt-row .rv { font-size: 13px; font-weight: 600; color: #333; }
    .receipt-row .rv.highlight { font-size: 16px; color: #1a237e; }
    .receipt-row .rv.green { color: #2e7d32; }

    .txn-ref {
      font-size: 10px;
      font-family: monospace;
      color: #999;
      margin-top: 12px;
      word-break: break-all;
    }

    .new-balance-row {
      margin-top: 14px;
      background: #e8f5e9;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .new-balance-row .nbl { font-size: 13px; color: #388e3c; font-weight: 600; }
    .new-balance-row .nbv { font-size: 17px; font-weight: 700; color: #1b5e20; }

    .btn-close {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ---- Recent transactions ---- */
    .txn-section {
      padding: 16px;
      flex: 1;
    }
    .txn-section h3 { font-size: 14px; color: #666; margin-bottom: 10px; }
    .txn-item {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .txn-item .ti-top { display: flex; justify-content: space-between; }
    .txn-item .ti-merchant { font-size: 14px; font-weight: 600; color: #333; }
    .txn-item .ti-amount { font-size: 14px; font-weight: 700; color: #c62828; }
    .txn-item .ti-bottom { display: flex; justify-content: space-between; margin-top: 4px; }
    .txn-item .ti-ref { font-size: 10px; color: #aaa; font-family: monospace; }
    .txn-item .ti-date { font-size: 11px; color: #999; }

    .no-txns { text-align: center; color: #bbb; font-size: 13px; padding: 20px 0; }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="phone">

  <!-- Header -->
  <div class="header">
    <h1>GMERemit Wallet</h1>
    <div class="subtitle">ZeroPay QR Payments</div>
  </div>

  <!-- User picker -->
  <div class="user-section">
    <label>Select user</label>
    <select id="userSelect" onchange="onUserChange()">
      <option value="">Loading...</option>
    </select>
    <div class="balance-badge" id="balanceBadge">Balance: ₩—</div>
  </div>

  <!-- QR section -->
  <div class="qr-section">
    <label>Paste ZeroPay QR payload</label>
    <div class="hint">Copy it from the Merchant Terminal simulator or another QR source.</div>
    <textarea id="qrInput" placeholder="00020101021226370016A000000642..."></textarea>
    <button class="btn btn-scan" onclick="doScan()">Scan QR</button>
  </div>

  <!-- Preview card -->
  <div class="preview-card" id="previewCard">
    <span class="merchant" id="previewMerchant">—</span>
    <span class="mode-badge" id="previewMode">static</span>
    <div class="amount-row">
      <span class="amount-label">Amount (KRW)</span>
      <span class="amount-static" id="previewAmountStatic" style="display:none"></span>
      <input type="number" id="amountInput" placeholder="e.g. 50000" min="1" step="1" style="display:none"/>
    </div>
    <button class="btn btn-pay" onclick="doPay()">Pay ₩</button>
    <button class="btn btn-clear" onclick="clearAll()">Clear</button>
  </div>

  <!-- Recent transactions -->
  <div class="txn-section">
    <h3>Recent transactions</h3>
    <div id="txnList"><div class="no-txns">No transactions yet.</div></div>
  </div>
</div>

<!-- Confirmation overlay -->
<div id="confirmScreen">
  <div class="confirm-card" id="confirmCard">
    <!-- filled by JS -->
  </div>
</div>

<script>
const API = '/v1/gmeremit';
let users = [];
let currentUser = null;
let previewData = null;

// ---- Boot ----
async function init() {
  const res = await fetch(API + '/users');
  users = await res.json();
  const sel = document.getElementById('userSelect');
  sel.innerHTML = '';
  users.forEach(u => {
    const opt = document.createElement('option');
    opt.value = u.userId;
    opt.text  = u.name;
    sel.appendChild(opt);
  });
  if (users.length) { currentUser = users[0]; refreshBalance(); }
}

function onUserChange() {
  const sel = document.getElementById('userSelect');
  currentUser = users.find(u => u.userId === sel.value) || null;
  refreshBalance();
  refreshTxns();
}

function refreshBalance() {
  if (!currentUser) return;
  // Re-fetch to get live balance
  fetch(API + '/users').then(r => r.json()).then(us => {
    users = us;
    currentUser = us.find(u => u.userId === currentUser.userId) || currentUser;
    document.getElementById('balanceBadge').textContent =
      'Balance: ₩' + Number(currentUser.balanceKrw).toLocaleString();
  });
}

// ---- Scan ----
async function doScan() {
  const qr = document.getElementById('qrInput').value.trim();
  if (!qr) { alert('Please paste a QR payload first.'); return; }
  const btn = document.querySelector('.btn-scan');
  btn.innerHTML = '<span class="spinner"></span>Scanning…';
  btn.disabled = true;

  try {
    const res = await fetch(API + '/scan', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ qrPayload: qr })
    });
    const data = await res.json();
    previewData = data;
    showPreview(data);
  } catch(e) {
    alert('Scan failed: ' + e.message);
  } finally {
    btn.innerHTML = 'Scan QR';
    btn.disabled = false;
  }
}

function showPreview(data) {
  document.getElementById('previewMerchant').textContent = data.merchantName || 'Unknown';
  const modeBadge = document.getElementById('previewMode');
  modeBadge.textContent = data.mode || 'static';

  const staticEl = document.getElementById('previewAmountStatic');
  const inputEl  = document.getElementById('amountInput');

  if (data.amount) {
    // Dynamic QR — amount is fixed
    staticEl.textContent = '₩' + Number(data.amount).toLocaleString();
    staticEl.style.display = 'inline';
    inputEl.style.display  = 'none';
    inputEl.value = data.amount;
  } else {
    // Static QR — user enters amount
    staticEl.style.display = 'none';
    inputEl.style.display  = 'flex';
    inputEl.value          = '';
    inputEl.focus();
  }

  document.getElementById('previewCard').classList.add('visible');
}

// ---- Pay ----
async function doPay() {
  if (!currentUser) { alert('Please select a user.'); return; }
  const qr = document.getElementById('qrInput').value.trim();
  if (!qr) { alert('QR payload is missing.'); return; }

  let amountKrw;
  if (previewData && previewData.amount) {
    amountKrw = previewData.amount;
  } else {
    amountKrw = document.getElementById('amountInput').value.trim();
    if (!amountKrw || isNaN(amountKrw) || Number(amountKrw) <= 0) {
      alert('Please enter a valid amount.'); return;
    }
  }

  const btn = document.querySelector('.btn-pay');
  btn.innerHTML = '<span class="spinner"></span>Processing…';
  btn.disabled = true;

  try {
    const res = await fetch(API + '/users/' + currentUser.userId + '/pay', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ qrPayload: qr, amountKrw: String(amountKrw) })
    });
    const data = await res.json();

    if (data.status === 'APPROVED') {
      showConfirmSuccess(data);
      clearAll();
    } else {
      showConfirmDeclined(data);
    }

    refreshBalance();
    refreshTxns();
  } catch(e) {
    alert('Payment failed: ' + e.message);
  } finally {
    btn.innerHTML = 'Pay ₩';
    btn.disabled = false;
  }
}

// ---- Confirmation screens ----
function showConfirmSuccess(data) {
  const r = data.receipt || {};
  const card = document.getElementById('confirmCard');
  card.className = 'confirm-card success';
  card.innerHTML = `
    <div class="big-icon">&#10003;</div>
    <div class="confirm-title">Payment successful</div>
    <div class="confirm-subtitle">Your payment has been processed via ZeroPay.</div>

    <div class="receipt-row">
      <span class="rl">Merchant</span>
      <span class="rv">${esc(r.merchantName || '—')}</span>
    </div>
    <div class="receipt-row">
      <span class="rl">Amount paid</span>
      <span class="rv highlight">&#8361;${fmt(r.payAmountKrw)}</span>
    </div>
    <div class="receipt-row">
      <span class="rl">Service fee</span>
      <span class="rv">&#8361;${fmt(r.feeKrw)}</span>
    </div>
    <div class="receipt-row">
      <span class="rl">Total charged</span>
      <span class="rv highlight">&#8361;${fmt(r.chargedKrw)}</span>
    </div>
    <div class="receipt-row">
      <span class="rl">Committed at</span>
      <span class="rv" style="font-size:11px">${esc(r.committedAt || '—')}</span>
    </div>

    <div class="txn-ref">TXN: ${esc(r.schemeTxnRef || '—')}</div>

    <div class="new-balance-row">
      <span class="nbl">New balance</span>
      <span class="nbv">&#8361;${fmt(data.newBalanceKrw)}</span>
    </div>

    <button class="btn-close" onclick="closeConfirm()">Done</button>
  `;
  showScreen();
}

function showConfirmDeclined(data) {
  const card = document.getElementById('confirmCard');
  card.className = 'confirm-card declined';
  card.innerHTML = `
    <div class="big-icon">&#10007;</div>
    <div class="confirm-title">Payment declined</div>
    <div class="confirm-subtitle">${data.merchantName ? esc(data.merchantName) : 'Your payment could not be processed.'}</div>
    <div class="decline-reason">${esc(data.declineReason || 'UNKNOWN')}</div>
    <button class="btn-close" style="background:#c62828" onclick="closeConfirm()">OK</button>
  `;
  showScreen();
}

function showScreen() {
  document.getElementById('confirmScreen').classList.add('visible');
}
function closeConfirm() {
  document.getElementById('confirmScreen').classList.remove('visible');
}

// ---- Transactions ----
async function refreshTxns() {
  if (!currentUser) return;
  try {
    const res = await fetch(API + '/users/' + currentUser.userId + '/transactions');
    const txns = await res.json();
    const el = document.getElementById('txnList');
    if (!Array.isArray(txns) || txns.length === 0) {
      el.innerHTML = '<div class="no-txns">No transactions yet.</div>';
      return;
    }
    // Most recent first
    const reversed = [...txns].reverse();
    el.innerHTML = reversed.map(t => `
      <div class="txn-item">
        <div class="ti-top">
          <span class="ti-merchant">${esc(t.merchantName || '—')}</span>
          <span class="ti-amount">-&#8361;${fmt(t.chargedKrw)}</span>
        </div>
        <div class="ti-bottom">
          <span class="ti-ref">${esc((t.schemeTxnRef || '').substring(0,20))}</span>
          <span class="ti-date">${esc((t.committedAt || '').substring(0,16).replace('T',' '))}</span>
        </div>
      </div>
    `).join('');
  } catch (e) { /* ignore */ }
}

// ---- Helpers ----
function clearAll() {
  document.getElementById('qrInput').value = '';
  document.getElementById('previewCard').classList.remove('visible');
  previewData = null;
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmt(val) {
  if (val == null) return '—';
  return Number(val).toLocaleString();
}

// ---- Init ----
init();
</script>
</body>
</html>
