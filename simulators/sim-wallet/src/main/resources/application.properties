server.port=9103
spring.application.name=sim-wallet

# Default partner profile when ?partner= is omitted
gmepay.sim.wallet.default-partner=GMEREMIT

# Downstream simulators
gmepay.sim.scheme.base-url=http://localhost:9102
gmepay.sim.rate.base-url=http://localhost:9101

# KRW service fee applied to every transaction
gmepay.sim.wallet.service-fee-krw=500

# SendMN FX margin (2%)
gmepay.sim.wallet.sendmn.fx-margin=0.02

# Logging
logging.level.com.gme.sim.wallet=DEBUG
