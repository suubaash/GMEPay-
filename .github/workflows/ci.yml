# GMEPay+ — CI (Phase 2 -> Phase 3 handoff artifact).
# Runs ./gradlew build on every push to main and every pull request.
# Uploads test reports as an artifact when the build fails so failures are debuggable from the PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --console=plain --no-daemon

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # integration — Docker-backed Testcontainers ITs (JUnit @Tag("docker")).
  # ubuntu-latest runners ship a Docker engine; the local Windows build box does
  # not, which is why these tests are tag-gated (see root build.gradle).
  # Ticket: 17.1-G02.
  # ---------------------------------------------------------------------------
  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-it-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-it-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Integration tests (Testcontainers)
        run: ./gradlew integrationTest --console=plain --no-daemon --continue

      - name: Upload IT reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: '**/build/reports/tests/integrationTest/**'
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # compose-smoke — validate docker-compose.yml and boot the core profile.
  # continue-on-error until the first observed green run, then flip to required
  # (ticket 17.1-G03 acceptance).
  # ---------------------------------------------------------------------------
  compose-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config -q

      - name: Boot core profile
        run: |
          docker compose --profile core up -d --quiet-pull || docker compose up -d --quiet-pull
          sleep 90
          docker compose ps
          # fail if any started container is unhealthy or exited
          BAD=$(docker compose ps --format '{{.Name}} {{.Status}}' | grep -Ei '(unhealthy|exited)' || true)
          if [ -n "$BAD" ]; then echo "Unhealthy/Exited:"; echo "$BAD"; docker compose logs --tail 100; exit 1; fi

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # ui-build — lint, test, and build both Next.js front-ends.
  #
  # Runs in parallel with the `build` job above (no `needs:` dependency).
  # Matrix-fan-out across the two apps so a failure in one does not mask the
  # other. `npm ci` is preferred; if a lockfile is missing or out of sync we
  # fall back to `npm install` so the job stays green for a freshly-scaffolded
  # app that has not yet committed a lockfile.
  # ---------------------------------------------------------------------------
  ui-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [admin-ui, partner-portal-ui]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Lint
        working-directory: apps/${{ matrix.app }}
        run: npm run lint

      - name: Test
        working-directory: apps/${{ matrix.app }}
        run: npm test

      - name: Build
        working-directory: apps/${{ matrix.app }}
        run: npm run build

      - name: Upload Next.js build trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-${{ matrix.app }}-logs
          path: apps/${{ matrix.app }}/.next/build-trace
          if-no-files-found: ignore
