# transaction-mgmt — persistence configuration.
#
# Defaults to in-memory H2 in PostgreSQL-compat mode so unit/integration tests run
# without Docker. Production overrides via SPRING_DATASOURCE_* environment variables.
# See INTER_SERVICE_CONTRACTS.md – this service owns the `txn` PostgreSQL DB.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:txndb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway owns the schema – Hibernate must not auto-DDL.
spring.jpa.hibernate.ddl-auto=none
# No dialect pin: Hibernate 6 auto-detects from the JDBC connection metadata, so
# H2 (unit slices) and PostgreSQL (docker-tagged ITs) both work without override.
spring.flyway.enabled=true

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# --- Eventing / outbox (17.4-G02) ---------------------------------------------------------
# Kafka is OFF by default: lib-events-kafka's auto-configuration only activates when
# spring.kafka.bootstrap-servers is present (docker-compose exports
# SPRING_KAFKA_BOOTSTRAP_SERVERS, bound by Spring's relaxed env binding — do NOT map it
# here with an empty default, that would falsely activate the Kafka publisher).
# Without it the outbox drains through the local LoggingEventPublisher.
# Outbox drain interval in milliseconds (OutboxPublisher fixed delay).
gmepay.outbox.poll-ms=1000

# --- Idempotency (17.3-G02) ---------------------------------------------------------------
# The Redis-backed idempotency store activates only when spring.data.redis.host is present
# (docker-compose exports SPRING_DATA_REDIS_HOST; same relaxed-binding rule as Kafka above).
# Default: in-memory single-node fallback store with the same 24h TTL semantics.

# --- OI-01: Approval-timeout expiry sweeper -----------------------------------------------
# Maximum seconds a transaction may remain in a non-terminal initial state before being
# automatically transitioned to FAILED with reason APPROVAL_TIMEOUT.
# UC-01/02 business rule: 60 seconds.
gmepay.txn.approval-timeout-seconds=60
# Sweep interval in milliseconds (fixedDelay between sweep invocations, KST zone).
gmepay.txn.expiry-sweeper.interval-ms=10000
# Set to false to disable the sweeper entirely (e.g. read-only replicas, test slices).
gmepay.txn.expiry-sweeper.enabled=true

# --- Ops: stuck/aged-transaction alert sweep ----------------------------------------------
# Emits an ops.alert (topic gmepay.ops.alert) for transactions stuck in a non-terminal state
# longer than the threshold. DEFAULT OFF — operators opt in per environment.
gmepay.txn.stuck-alert.enabled=false
# Fixed delay between sweeps (ms).
gmepay.txn.stuck-alert.interval-ms=60000
# Age (seconds since last update) beyond which a stuck txn raises a WARN alert. Default 15 min.
gmepay.txn.stuck-alert.threshold-seconds=900
# Multiplier on the threshold beyond which the alert escalates to CRITICAL. Default 4x (1h).
gmepay.txn.stuck-alert.critical-multiplier=4
# Comma-separated statuses considered stuck-eligible. Default UNCERTAIN; add PENDING_DEBIT,
# SCHEME_SENT to also alert on in-flight rows that never resolved.
gmepay.txn.stuck-alert.statuses=UNCERTAIN
