# transaction-mgmt — persistence configuration.
#
# Defaults to in-memory H2 in PostgreSQL-compat mode so unit/integration tests run
# without Docker. Production overrides via SPRING_DATASOURCE_* environment variables.
# See INTER_SERVICE_CONTRACTS.md – this service owns the `txn` PostgreSQL DB.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:txndb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway owns the schema – Hibernate must not auto-DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true
