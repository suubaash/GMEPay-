# Datasource: defaults to in-memory H2 (PostgreSQL mode) so tests run without Docker.
# Production overrides come from the SPRING_DATASOURCE_* environment variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:prefunding;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway is the only schema manager; Hibernate must never DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# Slice 5 (5B.1) — tier alerting + breach auto-suspend.
# Outbox drain interval for the gmepay.prefunding.alert events (OutboxPublisher).
gmepay.outbox.poll-ms=1000
# Breach hook: the in-memory StubConfigRegistryClient is the default so the service
# (and its tests) boot standalone. Set gmepay.config-registry.client=rest in deployment
# to POST real system change_requests (status=SUSPENDED, proposed_by='system', ADR-008).
gmepay.config-registry.base-url=http://config-registry:8080
