spring:
  application:
    name: scheme-adapter-zeropay

server:
  port: 8090

management:
  server:
    port: 8091
  endpoint:
    health:
      show-details: always

adapter:
  zeropay:
    enabled: true
    scheme-id: ZEROPAY
    scheme-name: ZeroPay
    operator-name: KFTC
    payout-currency: KRW
    realtime-api-base-url: ""
    sftp-host: ""
    sftp-port: 22
    mai-tag: "29"

# ZeroPay scheme simulator (sim-scheme :9102) base URL.
# Override with GMEPAY_SCHEME_ZEROPAY_BASE_URL in production.
# If unset, the default in ZeroPaySchemeApiClient (http://localhost:9102/v1/scheme) applies.
gmepay:
  scheme:
    zeropay:
      base-url: http://localhost:9102/v1/scheme

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
