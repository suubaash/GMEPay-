# scheme-adapter-zeropay — persistence configuration (batch file registry + ZP record staging).
#
# Defaults to in-memory H2 in PostgreSQL-compat mode so unit/slice tests run without
# Docker. Real-PostgreSQL coverage lives in the @Tag("docker") Testcontainers IT
# (ZpBatchPersistencePostgresIT), executed by the `integrationTest` task in CI.
# Production overrides via SPRING_DATASOURCE_* environment variables.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:zpadapterdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway owns the schema — Hibernate must not auto-DDL. No dialect is pinned:
# Hibernate auto-detects H2 vs PostgreSQL so one config serves both engines
# (no H2-only workarounds).
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
