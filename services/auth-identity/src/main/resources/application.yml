spring:
  application:
    name: auth-identity
  # Default datasource: in-process H2 in PostgreSQL-compat mode for dev/test.
  # Production sets SPRING_DATASOURCE_* env vars to point at the owned PostgreSQL
  # instance (MSA rule 1: this service owns its DB).
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:authid;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none   # schema is owned by Flyway, not Hibernate
  flyway:
    enabled: true

server:
  port: 8085

gme:
  auth:
    jwt:
      # Override via environment variable GME_AUTH_JWT_SIGNING_SECRET in production.
      # Must be at least 32 characters for HS256 security.
      signing-secret: ${GME_AUTH_JWT_SIGNING_SECRET:changeme-at-least-32-chars-long!!}
      # Access token lifetime: 30 minutes (1800 s).
      access-token-ttl-seconds: ${GME_AUTH_JWT_ACCESS_TOKEN_TTL_SECONDS:1800}
      # Hard upper bound on a per-request TTL override at /internal/auth/token/issue.
      # A caller may request a shorter token but never one longer than this (1 h).
      max-token-ttl-seconds: ${GME_AUTH_JWT_MAX_TOKEN_TTL_SECONDS:3600}
  config-registry:
    # Base URL of the config-registry service. Production injects this via env var.
    base-url: ${GME_CONFIG_REGISTRY_BASE_URL:http://config-registry:8080}

# Service-to-service internal-auth gate (#90). auth-identity's /v1/rbac/** (resolution + management),
# /v1/approvals/** (approval decisions), and /internal/** (API-key issuance + HMAC verify) are
# internal-only — reached server-to-server by the api-gateway claim resolver, the ops BFF, and
# config-registry, NOT through the gateway's strip/stamp filter — so without a gate any actor with
# network reach could enumerate/mint RBAC claims, mutate the catalogue, forge an approval, or issue
# partner API keys. When enabled, a request to those paths must carry the shared X-Gme-Internal token
# (default path-patterns in InternalAuthProperties cover all three). Disabled by default so
# local single-service dev / H2 tests are unaffected; docker-compose + production set both env vars
# (the auto-config fails the service closed if enabled with a blank secret). NOTE: this gate asserts
# "a trusted internal service is calling" — operator-level authority (rbac.manage) is enforced upstream.
gmepay:
  internal-auth:
    enabled: ${GMEPAY_INTERNAL_AUTH_ENABLED:false}
    secret: ${GMEPAY_INTERNAL_AUTH_SECRET:}

logging:
  level:
    com.gme.pay.auth: INFO

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
