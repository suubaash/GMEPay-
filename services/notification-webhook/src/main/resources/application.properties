spring.application.name=notification-webhook
server.port=8085

# ---------------------------------------------------------------------------
# Phase-1 persistence: H2 by default so tests / local dev need no Docker.
# Production overrides via env vars (PostgreSQL).
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:notify;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true

# ---------------------------------------------------------------------------
# Kafka (17.4-G04): intentionally NO local default for bootstrap servers.
# The payment.approved consumer (WebhookKafkaConsumerConfig) and the
# lib-events-kafka publisher both activate only when
# spring.kafka.bootstrap-servers is set — docker-compose injects
# SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092 via standard relaxed binding.
# Without it the service runs broker-free (unit slices, local dev).
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Webhook delivery dispatcher (WBS 8.6). The @Scheduled drain in WebhookDispatcher
# is DISABLED by default so H2-only unit slices / local dev never attempt outbound
# delivery. Enable with GMEPAY_WEBHOOK_DISPATCHER_ENABLED=true alongside a reachable
# endpoint registration and a resolvable signing secret.
# ---------------------------------------------------------------------------
gmepay.webhook.dispatcher.enabled=${GMEPAY_WEBHOOK_DISPATCHER_ENABLED:false}
gmepay.webhook.dispatcher.interval-ms=${GMEPAY_WEBHOOK_DISPATCHER_INTERVAL_MS:30000}
gmepay.webhook.dispatcher.initial-delay-ms=${GMEPAY_WEBHOOK_DISPATCHER_INITIAL_DELAY_MS:5000}

# Outbound HTTP transport: 'rest' (default, RestWebhookHttpClient). Any other value
# suppresses the bean (tests mock WebhookHttpClient directly).
gmepay.webhook.http-client=${GMEPAY_WEBHOOK_HTTP_CLIENT:rest}

# Endpoint environment to deliver to (V004 roster: SANDBOX | LIVE).
gmepay.webhook.environment=${GMEPAY_WEBHOOK_ENVIRONMENT:LIVE}

# Signing-secret stand-in for the Vault (audit P1: "secrets in Vault in-memory").
# The webhook_endpoint row stores only the secret HASH; the plaintext is Vault-bound
# at registration. Until the Vault is wired, set this for local/dev so the dispatcher
# can sign; leave blank in prod and supply a Vault-backed WebhookTargetResolver bean.
gmepay.webhook.signing-secret=${GMEPAY_WEBHOOK_SIGNING_SECRET:}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
