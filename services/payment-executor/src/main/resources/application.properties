spring.application.name=payment-executor
server.port=8084

# ---- downstream service base URLs (Phase-1 wiring) ----
# Each adapter reads its own gmepay.<service>.base-url property; the default values
# below match the in-cluster DNS names used in INTER_SERVICE_CONTRACTS.md.
gmepay.config-registry.base-url=http://config-registry:8080
gmepay.rate-fx.base-url=http://rate-fx:8080
gmepay.prefunding.base-url=http://prefunding:8080
gmepay.merchant-qr-data.base-url=http://merchant-qr-data:8080
gmepay.scheme-adapter-zeropay.base-url=http://scheme-adapter-zeropay:8080
gmepay.transaction-mgmt.base-url=http://transaction-mgmt:8080
gmepay.revenue-ledger.base-url=http://revenue-ledger:8080

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
