spring.application.name=payment-executor
server.port=8084

# ---- datasource (17.2-G08: execution_attempts + idempotency_keys) ----
# Defaults to in-memory H2 (PostgreSQL mode) so unit slices run without Docker.
# Production / docker ITs override via SPRING_DATASOURCE_* (real PostgreSQL 16).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:payment_executor;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway is the only schema manager; Hibernate must never DDL. No explicit dialect —
# Hibernate auto-detects (H2 locally, PostgreSQL in docker ITs/production).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# ---- downstream service base URLs (Phase-1 wiring) ----
# Each adapter reads its own gmepay.<service>.base-url property; the default values
# below match the in-cluster DNS names used in INTER_SERVICE_CONTRACTS.md.
gmepay.config-registry.base-url=http://config-registry:8080
gmepay.rate-fx.base-url=http://rate-fx:8080
gmepay.sim-rate-provider.base-url=http://localhost:9101
gmepay.prefunding.base-url=http://prefunding:8080
gmepay.merchant-qr-data.base-url=http://merchant-qr-data:8080
gmepay.scheme-adapter-zeropay.base-url=http://scheme-adapter-zeropay:8080
gmepay.transaction-mgmt.base-url=http://transaction-mgmt:8080
gmepay.revenue-ledger.base-url=http://revenue-ledger:8080

# ---- SENDMN overseas payment settings ----
# FX margin applied over mid-rate for KRW->MNT (0.02 = 2%).
gmepay.payment.sendmn.fx-margin=0.02

# ---- GMEREMIT wallet payment settings ----
# STRICT is the only non-dev behavior: a merchant-qr-data miss/unreachable HARD-FAILS the GMEREMIT
# payment with MERCHANT_NOT_FOUND (404). Synthesizing a placeholder UNKNOWN merchant is a DEV-ONLY
# escape hatch behind the explicit flag below (default false). Leaving it false means a stray config
# can never weaken merchant validation in production.
gmepay.payment.dev-synth-merchant=false
# (legacy) SendmnPaymentService still reads gmepay.payment.merchant-validation; kept for that path.
gmepay.payment.merchant-validation=strict

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
