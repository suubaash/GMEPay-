spring.application.name=reporting-compliance
server.port=8087

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# --- transaction-mgmt client ---
# Override in production/K8s via env var GMEPAY_TRANSACTION_MGMT_BASE_URL
gmepay.transaction-mgmt.base-url=http://transaction-mgmt:8080

# --- BOK FX reporting ---
# Set to true in production to enable daily BOK FX1014/FX1015 file generation.
# Default false so tests and local boots are clean (no scheduler fires, no NoSuchBean).
gmepay.reporting.bok.enabled=false
# Directory where BOK output files are written. Created if absent.
gmepay.reporting.bok.outbound-dir=./build/bok-out
# GME entity identifier sent in col 3 of every BOK record line.
gmepay.reporting.bok.entity-id=GME_KR

# --- Hometax e-tax-invoice (Lane B, UC-04-04) ---
# Master gate: false = job skips at runtime (no NTS calls); true = live submission.
# Default false; override in production/K8s via env var GMEPAY_REPORTING_HOMETAX_ENABLED=true.
gmepay.reporting.hometax.enabled=false
# Merchant business code used to look up V029 partner_regulatory_config (vat_treatment, etc.)
gmepay.reporting.hometax.partner-code=GMEREMIT
# Decimal merchant fee rate applied to monthly KRW volume (e.g. 0.0150 = 1.5 %).
gmepay.reporting.hometax.fee-rate=0.0150
# config-registry base URL — used by the production RegulatoryConfigClient.
gmepay.config-registry.base-url=http://config-registry:8086
# Hometax NTS API base URL — used by the production HometaxClient.
gmepay.hometax.base-url=https://api.hometax.go.kr
# lib-vault document id of the NTS mTLS issuer certificate.
gmepay.hometax.cert-id=stub-cert-id

# --- KoFIU CTR/STR feed (Lane C, UC-04-05) ---
# Master gate: false = scheduler is a no-op; true = builds + submits daily feed.
# Default false; override in production/K8s via env var GMEPAY_REPORTING_KOFIU_ENABLED=true.
gmepay.reporting.kofiu.enabled=false
# Directory where KoFIU daily feed files (KOFIU_YYYYMMDD.dat) are written.
gmepay.reporting.kofiu.output-dir=./build/kofiu-out
# Fallback KoFIU reporting entity identifier (overridden per-partner from V029 regulatory config).
gmepay.reporting.kofiu.entity-id=GME_KR_KOFIU
