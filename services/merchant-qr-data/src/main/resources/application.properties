# merchant-qr-data — persistence wiring (WBS 9.3 / 17.7-G01, ADR-003: MongoDB).
#
# Default: spring.data.mongodb.uri is NOT set, all Mongo auto-configuration is
# excluded, and the in-memory MerchantRepository serves lookups. Unit tests and
# local development therefore need no Mongo daemon.
#
# To enable the MongoDB-backed store, provide SPRING_DATA_MONGODB_URI (e.g.
# mongodb://host:27017/merchant). MongoPersistenceConfig is gated on that
# property and wires the Mongo client, template, Spring Data repositories and
# the unique qrCode index; MongoBackedMerchantRepository then becomes @Primary.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
