# merchant-qr-data — Phase-1 MongoDB persistence (WBS 9.3-T08).
# The connection URI is overridable via SPRING_DATA_MONGODB_URI for prod/staging.
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/merchant}

# Exclude Mongo auto-configuration so the existing unit tests can build a Spring
# context (or just construct services directly) without a running Mongo daemon.
# Production deploys provide SPRING_DATA_MONGODB_URI and remove this exclude.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
