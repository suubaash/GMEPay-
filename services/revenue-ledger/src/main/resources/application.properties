spring.application.name=revenue-ledger
server.port=8085

# --- Datasource (H2 in-memory by default; production overrides via SPRING_DATASOURCE_* env vars) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ledger;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- JPA / Hibernate (schema is owned by Flyway; ddl-auto stays off) ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Store java.time.Instant against plain TIMESTAMP columns (no _WITH_TIME_ZONE) so the
# Flyway migration's TIMESTAMP type lines up across H2 and PostgreSQL.
spring.jpa.properties.hibernate.timezone.default_storage=NORMALIZE_UTC

# --- Flyway (PostgreSQL-compatible migrations also run against H2 PostgreSQL mode) ---
spring.flyway.enabled=true

# --- Outbox publisher (transactional Outbox -> EventPublisher) ---
gmepay.outbox.poll-ms=1000

# --- Kafka domain events (libs/lib-events-kafka, 17.4-G03) ---
# KafkaEventPublisherAutoConfiguration registers the @Primary Kafka-backed EventPublisher
# ONLY when spring.kafka.bootstrap-servers is set. docker-compose provides it via the
# standard env var SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092 (relaxed binding); locally it
# is intentionally unset, so the outbox drains to LogEventPublisher — no broker required.

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true
