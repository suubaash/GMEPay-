# kyb-adapter service configuration (ADR-009 / ADR-014).
server.port=8098

# ---------------------------------------------------------------------------
# Adapter-side persistence (Slice 3): the kyb_screening run log. H2 by default
# so unit slices / local dev need no Docker; production overrides via env to
# PostgreSQL. Flyway owns the schema (ddl-auto=none). This is the adapter's own
# record of every verification run — distinct from config-registry's partner_kyb.
# ---------------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:kyb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=true

# Business-registration verifier (KFTC 사업자등록 진위확인 rail). 'stub'
# (deterministic in-process default, until the KFTC production certificate is
# provisioned) or 'kftc' (KftcBusinessRegistrationVerifier — fails fast per the
# same gating as config-registry's KftcVerificationAdapter).
gmepay.kyb.biz-reg.provider=${GMEPAY_KYB_BIZREG_PROVIDER:stub}

# Active KYB provider: 'stub' (deterministic StubKybAdapter, the default until
# Octa Solution sandbox credentials land) or 'octa' (OctaKybAdapter — requires
# gmepay.kyb.octa.base-url + gmepay.kyb.octa.api-key; currently fails fast per
# ADR-014).
gmepay.kyb.provider=stub

# Octa Solution connection (only read when gmepay.kyb.provider=octa).
# Production injects these via environment (GMEPAY_KYB_OCTA_BASE_URL / _API_KEY).
#gmepay.kyb.octa.base-url=
#gmepay.kyb.octa.api-key=

# Kafka fan-out of screening results to gmepay.kyb.screening. The
# KafkaEventPublisher auto-config (lib-events-kafka) only activates when
# spring.kafka.bootstrap-servers is set; without it the LogEventPublisher
# fallback records each event at INFO. Compose/production set
# SPRING_KAFKA_BOOTSTRAP_SERVERS.
#spring.kafka.bootstrap-servers=

# Surface the human-readable reason on ResponseStatusException so callers
# (config-registry's RestKybClient) can relay meaningful error messages.
server.error.include-message=always
