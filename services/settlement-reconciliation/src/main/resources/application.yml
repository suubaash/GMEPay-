spring:
  application:
    name: settlement-reconciliation
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:settlement;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

server:
  port: 8085

settlement:
  morning-cutoff: "04:30"
  afternoon-cutoff: "13:30"
  timezone: "Asia/Seoul"
  scheme:
    zeropay:
      # ZeroPay's share of the international merchant fee (monthly invoice cycle)
      international-fee-share-rate: "0.0021"
