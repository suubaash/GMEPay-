spring:
  application:
    name: settlement-reconciliation
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:settlement;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

server:
  port: 8085

settlement:
  morning-cutoff: "04:30"
  afternoon-cutoff: "13:30"
  timezone: "Asia/Seoul"
  scheme:
    zeropay:
      # ZeroPay's share of the international merchant fee (monthly invoice cycle)
      international-fee-share-rate: "0.0021"

gmepay:
  settlement:
    recon:
      # Gate: set to true in production only. Default false prevents accidental recon in dev/test.
      enabled: false
      # Inbox directory where ZeroPay drops result files (ZP0062_YYYYMMDD.txt etc.)
      # Phase 2b TODO: replace with SFTP pull — leave blank until then.
      inbox-dir: ""
      # Cron expressions in UTC (KST = UTC+9). Overridable per environment.
      morning-cron: "5 5 1 * * *"    # 10:05 KST
      afternoon-cron: "5 5 10 * * *"  # 19:05 KST
    generation:
      # Gate: set to true in production only. Default false prevents accidental file generation in dev/test.
      enabled: false
      # Outbound generation crons, expressed in KST (the scheduler sets zone=Asia/Seoul). Overridable.
      morning-cron: "0 0 5 * * *"     # ZP0061 morning request, 05:00 KST
      afternoon-cron: "0 0 14 * * *"  # ZP0063 afternoon request, 14:00 KST
      detail-cron: "0 0 22 * * *"     # ZP0065 + ZP0066 detail files, 22:00 KST
  clients:
    transaction-mgmt:
      base-url: ${TRANSACTION_MGMT_URL:http://transaction-mgmt:8082}

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
