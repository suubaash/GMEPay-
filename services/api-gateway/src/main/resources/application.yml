spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false        # manual route registration only
      default-filters:
        - AddRequestHeader=X-Gateway-Version, v1
  # Slice 1 (ADR-011): OAuth2 resource server. Human traffic from admin-ui /
  # partner-portal-ui bears Keycloak-issued JWTs. The issuer URI below is the
  # default for the docker-compose Keycloak service (realm = gmepay); override
  # via SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI per environment.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/gmepay

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    redis:
      enabled: true
  metrics:
    tags:
      application: api-gateway

otel:
  service:
    name: api-gateway
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

# Per-API-version deprecation config (Phase 1: v1 is live, not deprecated)
api:
  versions:
    v1:
      deprecated: false

# Internal service-to-service token (#90). The gateway's RBAC claim resolver calls auth-identity's
# internal-only /v1/rbac/resolve; when auth-identity enforces the internal-auth gate, the gateway
# presents this shared secret in the X-Gme-Internal header. Blank = local dev (gate off).
gmepay:
  internal-auth:
    secret: ${GMEPAY_INTERNAL_AUTH_SECRET:}

# Replay-protection fail-open flag (true = allow request if Redis is unreachable)
gateway:
  replay-protection:
    fail-open: true
    # nonce store backend: 'memory' (default, single-instance) or 'redis' (shared)
    store: memory
  trust-proxy: false

  # Per-partner rate limiting (API-05 §3.5). Disabled by default so local dev and the
  # existing test suite are unthrottled; switch on per environment. Limits are per second.
  rate-limit:
    enabled: false
    fail-open: true
    store: memory            # 'memory' (default, per-instance) or 'redis' (shared)
    global-per-second: 100
    rates-per-second: 20
    payments-per-second: 50

  # Partner credential source: 'stub' (default, hard-coded test partners) or 'config'
  # (externalised table below — operators add rows without recompiling). A live
  # config-registry/DB-backed implementation (T18) can replace this behind the same
  # PartnerCredentialService interface. hmac-secret MUST be a placeholder/env var in real
  # deployments, never a literal.
  partner-credentials:
    source: stub
    partners: []

# HMAC signature verification settings
security:
  gateway:
    hmac:
      # Maximum permitted age of X-Timestamp in either direction (seconds).
      # Partners whose system clock drifts beyond this window will receive 401 EXPIRED_TIMESTAMP.
      clock-skew-seconds: 300

    # mTLS client-certificate fingerprint verification.
    # In production Nginx terminates mTLS and forwards the SHA-256 fingerprint of the verified
    # client certificate as the X-Client-Cert-Fingerprint header.  This filter checks that
    # fingerprint against the value stored in partner_mtls_cert.
    # Set enabled=true only in environments where the gateway sits behind an Nginx mTLS proxy;
    # leaving it false (default) means mTLS is not enforced locally or in tests.
    mtls:
      enabled: false
      client-cert-header: X-Client-Cert-Fingerprint

    # IP-allowlist settings (Slice 8)
    allowlist:
      trust_header_only_in_dev: true
      default-environment: sandbox
      fail-open: true
      cache-ttl-seconds: 60
