spring.application.name=rate-fx

# Persistence — defaults to in-memory H2 in PostgreSQL-compat mode so unit slices run
# without Docker. Production overrides via SPRING_DATASOURCE_* environment variables
# (PostgreSQL 16). The real-PG contract is verified by the @Tag("docker") Testcontainers
# ITs (run via the root `integrationTest` task on CI; this machine has no Docker).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ratefxdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway owns the schema — Hibernate must not auto-DDL.
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

# Quote TTL (rate lock) in seconds. The lock lives in the QuoteTtlStore:
# Redis-backed (key rq:{quoteId}, EXPIRE = this TTL) when spring.data.redis.host is
# set — e.g. SPRING_DATA_REDIS_HOST=redis — otherwise an in-memory fallback is used.
rate.quote.ttl-seconds=900

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# XE live-rate integration (audit gap B4 / UC-05-01).
# Point base-url at sim-rate-provider (simulators/sim-rate-provider, port 9101) for dev/test.
# Set enabled=true + override base-url in production to use the real xe.com endpoint.
#gmepay.rate-fx.xe.enabled=false
