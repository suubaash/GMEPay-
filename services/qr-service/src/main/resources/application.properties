# qr-service — persistence configuration (17.2-G04).
#
# Defaults to in-memory H2 in PostgreSQL-compat mode so unit/slice tests run without
# Docker. Production (and the Testcontainers PostgreSQL 16 ITs) override via
# SPRING_DATASOURCE_* / dynamic properties. This service owns the QR-parse result
# cache and merchant-resolution cache tables only.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:qrdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Flyway owns the schema – Hibernate must not auto-DDL.
# No dialect is pinned: Hibernate 6 auto-detects (H2 locally, PostgreSQL in CI/prod),
# so the same migrations run unmodified on both engines.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true
