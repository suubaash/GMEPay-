spring:
  application:
    name: qr-service
  # NOTE: datasource / JPA / Flyway settings live in application.properties so the
  # H2-PostgreSQL-mode test default and SPRING_DATASOURCE_* prod overrides stay in
  # one place. Do not duplicate them here.

server:
  port: 8084

qr:
  zeropay:
    mai-tag: 26
    cpm-token-ttl-seconds: 60

internal:
  api:
    token: changeme-internal-token

# Phase 2: prefunding reserve/release for OVERSEAS (outbound) CPM issuance (IR-qr-3).
# Disabled by default so unit/slice tests + no-prefunding runs use the in-memory fixture
# (InMemoryPrefundingReservationFixture). Set enabled=true + base-url in deployments where
# prefunding is reachable to wire the real RestPrefundingReservationClient.
gmepay:
  prefunding:
    reserve:
      enabled: false
    base-url: http://prefunding:8080

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
