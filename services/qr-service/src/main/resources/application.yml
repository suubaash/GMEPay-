spring:
  application:
    name: qr-service

server:
  port: 8084

qr:
  zeropay:
    mai-tag: 26
    cpm-token-ttl-seconds: 60

internal:
  api:
    token: changeme-internal-token

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
