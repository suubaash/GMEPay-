spring.application.name=ops-partner-bff
server.port=8095

# Pass the human-readable reason through to the Admin UI / Partner Portal so a
# 409 / 404 surfaces "partner '...' already exists" instead of the bare error
# code. Required so RestConfigRegistryClient can forward upstream messages.
server.error.include-message=always

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# Upstream backend service base URLs. Read by Rest*Client adapters via @Value.
# In Phase 1 the @Primary stub clients are wired by default; once Rest* adapters
# are activated they take precedence and call these URLs.
gmepay.config-registry.base-url=http://config-registry:8080
gmepay.transaction-mgmt.base-url=http://transaction-mgmt:8080
gmepay.prefunding.base-url=http://prefunding:8080
gmepay.revenue-ledger.base-url=http://revenue-ledger:8080
gmepay.settlement-reconciliation.base-url=http://settlement-reconciliation:8080
gmepay.reporting-compliance.base-url=http://reporting-compliance:8080
gmepay.auth-identity.base-url=http://auth-identity:8080
# Internal service-to-service token (#90). auth-identity's /v1/rbac/** and /v1/approvals/** are
# internal-only; when auth-identity enforces the internal-auth gate, the BFF presents this shared
# secret in the X-Gme-Internal header on every call. Blank = local dev (gate off).
gmepay.auth-identity.internal-secret=${GMEPAY_INTERNAL_AUTH_SECRET:}

# Client selector per upstream: 'stub' (default, in-memory) or 'rest' (live HTTP).
# Mirrors gmepay.config-registry.client. The Stub* and Rest* beans are mutually
# exclusive via @ConditionalOnProperty so exactly one is wired. Override per
# environment, e.g. GMEPAY_TRANSACTION_MGMT_CLIENT=rest, once the upstream is up.
gmepay.transaction-mgmt.client=${GMEPAY_TRANSACTION_MGMT_CLIENT:stub}
gmepay.settlement-reconciliation.client=${GMEPAY_SETTLEMENT_RECONCILIATION_CLIENT:stub}
# reporting-compliance GET /v1/reports (BOK FX1014/FX1015). StubReportingClient by default;
# set GMEPAY_REPORTING_COMPLIANCE_CLIENT=rest to call the live service.
gmepay.reporting-compliance.client=${GMEPAY_REPORTING_COMPLIANCE_CLIENT:stub}
# auth-identity /v1/rbac/* (RBAC management — roles/permissions). StubRbacAdminClient by default;
# set GMEPAY_AUTH_IDENTITY_CLIENT=rest to back the admin-ui RBAC page with live data.
gmepay.auth-identity.client=${GMEPAY_AUTH_IDENTITY_CLIENT:stub}
# NOTE: revenue-ledger has no 'rest' client yet. GET /v1/revenue is per-(numeric)
# partnerId only and the BFF holds partner CODES, not numeric ids; and the upstream
# store returns zeros until the P1 revenue-ingestion work lands. A faithful rest
# client is therefore blocked on that P1 item (aggregate-across-partners endpoint +
# JPA-backed revenue store) — until then the in-memory StubRevenueLedgerClient stays
# wired so the dashboard renders, rather than shipping a synthetic "rest" client.

# Slice 3 (3A.1) — KYB document upload relay (ADR-006). Spring Boot's default
# multipart cap is 1MB; license/AoA scans routinely exceed that. 25MB matches
# config-registry's limit so the BFF never accepts what upstream would reject.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=26MB
