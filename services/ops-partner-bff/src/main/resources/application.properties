spring.application.name=ops-partner-bff
server.port=8095

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# Upstream backend service base URLs. Read by Rest*Client adapters via @Value.
# In Phase 1 the @Primary stub clients are wired by default; once Rest* adapters
# are activated they take precedence and call these URLs.
gmepay.config-registry.base-url=http://config-registry:8080
gmepay.transaction-mgmt.base-url=http://transaction-mgmt:8080
gmepay.prefunding.base-url=http://prefunding:8080
gmepay.revenue-ledger.base-url=http://revenue-ledger:8080
gmepay.settlement-reconciliation.base-url=http://settlement-reconciliation:8080
