# config-registry service configuration.
#
# Default datasource: in-process H2 in PostgreSQL-compat mode for dev/test (no Docker required).
# Production overrides via SPRING_DATASOURCE_* env vars to point at the owned PostgreSQL
# instance (MSA rule 1: this service owns its DB; see INTER_SERVICE_CONTRACTS.md).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:configreg;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Schema is owned by Flyway, not Hibernate. The dialect is auto-detected from the
# datasource (H2 for local/unit slices, PostgreSQL in production and docker ITs) —
# do not pin it here (17.2-G01: no H2-mode workarounds).
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true

# Surface the human-readable reason on ResponseStatusException + ApiException so
# the BFF (and downstream UIs) can render meaningful error messages instead of
# Spring's default "{ timestamp, status, error, path }" stub.
server.error.include-message=always

# Redis config cache (17.3-G03): cache-aside on hot config GET paths with explicit
# DEL on writes. The cache beans are gated on spring.data.redis.host — when it is
# unset (local dev, unit slices) the cache is a no-op pass-through straight to the DB.
# Production sets SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT via the environment.
# Entry TTL for cached config values (staleness ceiling if an eviction is ever lost).
registry.cache.ttl=10m

# Springdoc (Swagger UI + /v3/api-docs). See OpenApiConfig.java for the bean.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

# Slice 3 (3A.1) — ADR-006 document vault. With gmepay.vault.endpoint UNSET the
# in-memory vault client is auto-wired (dev/unit-slice default: zero infra).
# Compose/production activate MinIO via environment:
#   GMEPAY_VAULT_ENDPOINT=http://minio:9000
#   GMEPAY_VAULT_ACCESSKEY / GMEPAY_VAULT_SECRETKEY (default to the compose dev creds)
# Bucket gmepay-partner-vault is auto-provisioned with versioning + object-lock
# COMPLIANCE retention (10y) by VaultBucketInitializer on first reachable boot.

# KYB document uploads (license/AoA scans). Spring Boot's default multipart cap
# is 1MB; 25MB is the platform's per-document ceiling (mirrored at the BFF).
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=26MB
