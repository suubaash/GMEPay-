# ============================================================================
# OVERLAY: AWS (EKS). Same images as on-prem; only the ABI env changes.
#   Postgres -> RDS          Kafka -> MSK
#   Redis    -> ElastiCache  Object store -> S3 (native, virtual-hosted style)
#   OIDC     -> Keycloak-on-EKS or Cognito issuer   Registry -> ECR
#
#   helm upgrade --install gmepay deploy/helm/gmepay \
#     -f deploy/helm/gmepay/values-aws.yaml \
#     -f aws-secrets.yaml        # private; or use External Secrets Operator
#
# ALL hostnames / ARNs / keys are PLACEHOLDERS — substitute your account values.
# ============================================================================

global:
  # ECR registry placeholder: <acct>.dkr.ecr.<region>.amazonaws.com/gmepay
  imageRegistry: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/gmepay
  imageTag: "1.0.0"
  imagePullPolicy: IfNotPresent
  # IRSA / node-role pulls ECR; explicit pull secret usually unnecessary.
  imagePullSecrets: []

abi:
  # ElastiCache for Redis (primary endpoint).
  SPRING_DATA_REDIS_HOST: gmepay.xxxxxx.ng.0001.apn2.cache.amazonaws.com
  SPRING_DATA_REDIS_PORT: "6379"
  # MSK bootstrap brokers (TLS — services must use SSL security protocol).
  SPRING_KAFKA_BOOTSTRAP_SERVERS: b-1.gmepay.xxxxx.kafka.ap-northeast-2.amazonaws.com:9094,b-2.gmepay.xxxxx.kafka.ap-northeast-2.amazonaws.com:9094
  GMEPAY_SCHEMA_REGISTRY_URL: https://schema-registry.gmepay.internal:8081
  # DocumentDB / self-managed Mongo (S3 is not Mongo). Placeholder cluster.
  SPRING_DATA_MONGODB_URI: mongodb://docdb.gmepay.internal:27017/merchant?tls=true&retryWrites=false
  # S3 (native) — virtual-hosted addressing, PATH_STYLE=false, REGION set.
  GMEPAY_VAULT_ENDPOINT: https://s3.ap-northeast-2.amazonaws.com
  GMEPAY_VAULT_REGION: ap-northeast-2
  GMEPAY_VAULT_PATH_STYLE: "false"
  # OIDC — Keycloak-on-EKS (shown) OR Cognito issuer:
  #   https://cognito-idp.<region>.amazonaws.com/<userPoolId>
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://auth.gmepay.example.com/realms/gmepay
  OIDC_ISSUER_URI: https://auth.gmepay.example.com/realms/gmepay
  # OTLP -> ADOT collector / managed OTLP endpoint.
  OTEL_EXPORTER_OTLP_ENDPOINT: http://adot-collector.observability.svc:4317

# Prefer External Secrets Operator pulling from AWS Secrets Manager: set
# create:false and provision <release>-credentials. Placeholders shown for
# bootstrap only.
secrets:
  create: true
  data:
    SPRING_DATASOURCE_USERNAME: gmepay
    SPRING_DATASOURCE_PASSWORD: REPLACE_FROM_SECRETS_MANAGER
    SPRING_DATA_REDIS_PASSWORD: REPLACE_WITH_ELASTICACHE_AUTH_TOKEN
    GMEPAY_VAULT_ACCESSKEY: REPLACE_OR_USE_IRSA
    GMEPAY_VAULT_SECRETKEY: REPLACE_OR_USE_IRSA
    GMEPAY_RBAC_SECRET: REPLACE_FROM_SECRETS_MANAGER
    GMEPAY_INTERNAL_AUTH_SECRET: REPLACE_FROM_SECRETS_MANAGER
    GMEPAY_WEBHOOK_SIGNING_SECRET: REPLACE_FROM_SECRETS_MANAGER

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:123456789012:certificate/REPLACE
  hosts:
    - host: api.gmepay.example.com
      paths: [{ path: /, pathType: Prefix, service: api-gateway, port: 8080 }]
    - host: admin.gmepay.example.com
      paths: [{ path: /, pathType: Prefix, service: admin-ui, port: 3000 }]
    - host: partner.gmepay.example.com
      paths: [{ path: /, pathType: Prefix, service: partner-portal-ui, port: 3001 }]

# DB-per-service -> point each at its RDS instance/database (placeholders).
services:
  config-registry:
    env: { SPRING_DATASOURCE_URL: jdbc:postgresql://gmepay-config.xxxxx.ap-northeast-2.rds.amazonaws.com:5432/configreg }
  prefunding:
    env: { SPRING_DATASOURCE_URL: jdbc:postgresql://gmepay-prefunding.xxxxx.ap-northeast-2.rds.amazonaws.com:5432/prefunding }
  auth-identity:
    env: { SPRING_DATASOURCE_URL: jdbc:postgresql://gmepay-authid.xxxxx.ap-northeast-2.rds.amazonaws.com:5432/authid }
  transaction-mgmt:
    env: { SPRING_DATASOURCE_URL: jdbc:postgresql://gmepay-txn.xxxxx.ap-northeast-2.rds.amazonaws.com:5432/txndb }
  scheme-adapter-zeropay:
    env: { SPRING_DATASOURCE_URL: jdbc:postgresql://gmepay-scheme.xxxxx.ap-northeast-2.rds.amazonaws.com:5432/zpadapter }
  notification-webhook:
    env: { SPRING_DATASOURCE_URL: jdbc:postgresql://gmepay-notify.xxxxx.ap-northeast-2.rds.amazonaws.com:5432/notify }
  settlement-reconciliation:
    env: { SPRING_DATASOURCE_URL: jdbc:postgresql://gmepay-settlement.xxxxx.ap-northeast-2.rds.amazonaws.com:5432/settlement }
  revenue-ledger:
    env: { SPRING_DATASOURCE_URL: jdbc:postgresql://gmepay-ledger.xxxxx.ap-northeast-2.rds.amazonaws.com:5432/ledger }
  admin-ui:
    env:
      NEXT_PUBLIC_BFF_BASE_URL: https://api.gmepay.example.com
      NEXT_PUBLIC_KEYCLOAK_URL: https://auth.gmepay.example.com/realms/gmepay
      NEXT_PUBLIC_ALLOW_DEV_LOGIN: "false"
  partner-portal-ui:
    env:
      NEXT_PUBLIC_BFF_BASE_URL: https://api.gmepay.example.com
      NEXT_PUBLIC_KEYCLOAK_URL: https://auth.gmepay.example.com/realms/gmepay-partners
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: gmepay-partner-ui
      NEXT_PUBLIC_ALLOW_DEV_LOGIN: "false"
