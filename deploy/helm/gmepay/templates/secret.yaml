{{/*
Credentials Secret — the secret slice of the portability ABI (DB passwords,
object-store keys, signing/internal secrets). Values come from .Values.secrets
which MUST be supplied at deploy time (--set / -f a private file / external
secret operator), NEVER committed. The overlays ship placeholders only.

PREFERRED in production: do NOT render this template at all. Set
.Values.secrets.create=false and provision the Secret out-of-band — a sealed
secret, External Secrets Operator pulling from AWS Secrets Manager / Azure Key
Vault / HashiCorp Vault, or the Secrets Store CSI driver — using the SAME name
(<release>-credentials) so the Deployments bind to it unchanged.
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gmepay.secretName" . }}
  labels:
    {{- include "gmepay.commonLabels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
